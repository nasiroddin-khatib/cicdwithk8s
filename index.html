<!DOCTYPE html>
<html>
<head>
  <title>Deployment Dashboard</title>
  <style>
    body { margin:0; font-family:"Segoe UI"; background:#0f172a; color:white; }

    .header {
      display:flex; justify-content:space-between;
      padding:15px 25px; background:#1e293b;
    }

    .badge { background:#facc15; padding:6px 12px; border-radius:20px; }

    .container { padding:40px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card {
      background:#1e293b;
      padding:20px;
      border-radius:10px;
    }

    .value { font-size:20px; font-weight:bold; }

    .progress-bar {
      background:#334155;
      border-radius:10px;
      overflow:hidden;
      margin-top:10px;
    }

    .progress {
      height:10px;
      width:60%;
      background:#facc15;
      animation: progressAnim 2s infinite alternate;
    }

    @keyframes progressAnim {
      from { width:40%; }
      to { width:80%; }
    }

  </style>
</head>
<body>

<div class="header">
  <div>Kubernetes Deployment Dashboard</div>
  <div class="badge">Version 2 (Updating)</div>
</div>

<div class="container">
  <div class="grid">

    <div class="card">
      <h3>Current Time</h3>
      <div class="value" id="time"></div>
    </div>

    <div class="card">
      <h3>System Status</h3>
      <div class="value">Updating...</div>
    </div>

    <div class="card">
      <h3>Environment</h3>
      <div class="value">Production</div>
    </div>

    <div class="card">
      <h3>Current Version</h3>
      <div class="value">v1</div>
    </div>

    <div class="card">
      <h3>Next Version</h3>
      <div class="value">v2 (Deploying)</div>
      <div class="progress-bar">
        <div class="progress"></div>
      </div>
    </div>

  </div>
</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerText=new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
