<!DOCTYPE html>
<html>
<head>
  <title>Deployment Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #0f172a;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 15px 25px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .version-badge {
      background: #22c55e;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
    }

    .container {
      padding: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #94a3b8;
      font-size: 14px;
    }

    .value {
      font-size: 20px;
      font-weight: bold;
    }

    .status-ok {
      color: #22c55e;
    }

    .status-next {
      color: #facc15;
    }

  </style>
</head>
<body>

<div class="header">
  <div class="title">Kubernetes Deployment Dashboard</div>
  <div class="version-badge">Version 1</div>
</div>

<div class="container">

  <div class="grid">

    <div class="card">
      <h3>Current Time</h3>
      <div class="value" id="time"></div>
    </div>

    <div class="card">
      <h3>System Status</h3>
      <div class="value status-ok">Healthy</div>
    </div>

    <div class="card">
      <h3>Environment</h3>
      <div class="value">Production</div>
    </div>

    <div class="card">
      <h3>Current Version</h3>
      <div class="value status-ok">v1</div>
    </div>

    <div class="card">
      <h3>Next Deployment</h3>
      <div class="value status-next">v2 (Rolling Update)</div>
    </div>

  </div>

</div>

<script>
setInterval(() => {
  document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}, 1000);
</script>

</body>
</html>
